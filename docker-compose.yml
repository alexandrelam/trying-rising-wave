services:
  # --- Kafka (KRaft, no ZooKeeper) ---
  kafka:
    image: bitnami/kafka:4.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
    volumes:
      - kafka-data:/bitnami
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- PostgreSQL (metadata store for RisingWave) ---
  postgres:
    image: postgres:17-alpine
    ports:
      - "8432:5432"
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: metadata
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- RisingWave (standalone mode) ---
  risingwave:
    image: risingwavelabs/risingwave:v2.7.1
    ports:
      - "4566:4566"   # PostgreSQL-compatible frontend
      - "5691:5691"   # Dashboard
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      RUST_BACKTRACE: "1"
      ENABLE_TELEMETRY: "false"
    command:
      - standalone
      - --meta-opts=--listen-addr 0.0.0.0:5690 --advertise-addr risingwave:5690 --sql-endpoint postgres://postgres@postgres:5432/metadata --state-store hummock+memory --data-directory hummock_001 --backend sql
      - --compute-opts=--listen-addr 0.0.0.0:5688 --advertise-addr risingwave:5688 --async-stack-trace verbose --parallelism 4 --total-memory-bytes 8589934592 --role both --meta-address http://0.0.0.0:5690
      - --frontend-opts=--listen-addr 0.0.0.0:4566 --advertise-addr risingwave:4566 --meta-addr http://0.0.0.0:5690
      - --compactor-opts=--listen-addr 0.0.0.0:6660 --advertise-addr risingwave:6660 --meta-addr http://0.0.0.0:5690
    volumes:
      - risingwave-data:/data
    healthcheck:
      test: ["CMD-SHELL", "psql -h localhost -p 4566 -U root -d dev -c 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  kafka-data:
  postgres-data:
  risingwave-data:
